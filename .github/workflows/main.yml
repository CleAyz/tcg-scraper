# SNKRDUNK scheduled scraper
#
# IMPORTANT: Do NOT run `npx ts-node index.ts` in CI — it type-checks on the fly and can fail
# differently than `tsc`. Always compile with `npm run build` then run `node dist/index.js`.

name: SNKRDUNK Scraper

on:
  schedule:
    - cron: "0 */3 * * *" # every 3 hours
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Use `npm install` when package-lock.json is not committed (see .gitignore).
      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      # Same as local: `npm run build` (tsc → dist/)
      - name: Compile TypeScript
        run: npm run build

      # Run compiled output only (NOT ts-node)
      - name: Run scraper
        run: node dist/index.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
